# =============================================
# Application Configuration
# =============================================
spring.application.name=cholon-hcmc

# =============================================
# PostgreSQL Database Configuration
# =============================================
spring.datasource.url=jdbc:postgresql://localhost:5432/cholon_hcc?sslmode=disable&TimeZone=UTC
spring.datasource.username=myuser
spring.datasource.password=secret
spring.datasource.driver-class-name=org.postgresql.Driver

# =============================================
# JPA/Hibernate Configuration
# =============================================
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
# Disable open-in-view warning
spring.jpa.open-in-view=false

# =============================================
# Flyway Migration Configuration
# =============================================
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration
spring.flyway.validate-on-migrate=true
spring.flyway.repair-on-migrate=true

# =============================================
# Server Configuration
# =============================================
server.port=8081

# =============================================
# Nginx Proxy Configuration
# (Khi chạy sau Nginx reverse proxy)
# =============================================
# Trust forwarded headers từ Nginx
server.forward-headers-strategy=framework
# Hoặc dùng NATIVE nếu muốn trust tất cả proxies
# server.forward-headers-strategy=native

# Tomcat sẽ đọc các header này từ Nginx:
# - X-Forwarded-For (Client IP thật)
# - X-Forwarded-Proto (HTTP/HTTPS)
# - X-Forwarded-Host (Domain gốc)

# =============================================
# Timezone Configuration
# =============================================
spring.jackson.time-zone=UTC

# =============================================
# JWT Configuration
# =============================================
# Secret key (must be at least 256 bits = 32 characters)
jwt.secret=MySecretKeyForJWTTokenGeneration2026VerySecure!@#$
# Token expiration time: 7 days = 604800000 milliseconds
# (Suitable for low-user systems, no frequent login required)
jwt.expiration=604800000

# =============================================
# Docker Compose Configuration
# =============================================
# Disable Docker Compose auto-detection
# (To run locally without Docker)
spring.docker.compose.enabled=false

# =============================================
# HikariCP Connection Pool (Optimized for 16GB RAM)
# =============================================
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.leak-detection-threshold=60000

# =============================================
# Hibernate Performance Tuning
# =============================================
spring.jpa.properties.hibernate.jdbc.batch_size=50
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.jdbc.batch_versioned_data=true
spring.jpa.properties.hibernate.generate_statistics=false
spring.jpa.properties.hibernate.cache.use_second_level_cache=false

# =============================================
# Logging Configuration
# =============================================
logging.level.org.hibernate.SQL=WARN
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=WARN
logging.level.com.zaxxer.hikari=INFO

# =============================================
# Tomcat Thread Pool (CPU Optimization)
# For i5 Gen 12: 6-10 cores
# =============================================
# Max threads = (CPU cores * 2) * (1 + wait_time/service_time)
# For API server: ~50-200 threads is typical
server.tomcat.threads.max=150
server.tomcat.threads.min-spare=20
server.tomcat.accept-count=100
server.tomcat.max-connections=8192
server.tomcat.connection-timeout=20000

# =============================================
# Async Task Executor (Background Tasks)
# =============================================
spring.task.execution.pool.core-size=4
spring.task.execution.pool.max-size=8
spring.task.execution.pool.queue-capacity=100
spring.task.execution.thread-name-prefix=async-task-

# =============================================
# Scheduled Task Executor
# =============================================
spring.task.scheduling.pool.size=3
spring.task.scheduling.thread-name-prefix=scheduled-task-

# =============================================
# Actuator (Health Check for Docker)
# =============================================
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized
management.health.db.enabled=true
management.health.diskspace.enabled=true

# =============================================
# Compression (Reduce bandwidth)
# =============================================
server.compression.enabled=true
server.compression.mime-types=application/json,application/xml,text/html,text/xml,text/plain
server.compression.min-response-size=1024
