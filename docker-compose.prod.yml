services:
  postgres:
    image: postgres:16-alpine
    container_name: govservice_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5433}:5432"
    networks:
      - govservice_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: govservice_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION_MS: ${JWT_EXPIRATION_MS:-86400000}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
      SPRING_PROFILES_ACTIVE: prod
    expose:
      - "8081"
    networks:
      - govservice_net
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8081/actuator/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5

  nginx:
    image: nginx:1.25-alpine
    container_name: govservice_nginx
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./nginx/logs:/var/log/nginx
      - ./AdminStaff/dist:/usr/share/nginx/html/admin:ro
      # - ./client/dist:/usr/share/nginx/html/client:ro
    networks:
      - govservice_net
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3

  ngrok:
    image: ngrok/ngrok:latest
    container_name: govservice_ngrok
    restart: unless-stopped
    entrypoint:
      - /bin/sh
      - -c
    command:
      - |
        if [ -z "$${NGROK_AUTHTOKEN}" ] || [ -z "$${NGROK_STATIC_DOMAIN}" ] || \
           [ "$${NGROK_STATIC_DOMAIN}" = "your-static-domain.ngrok-free.app" ]; then
          echo "NGROK_AUTHTOKEN or NGROK_STATIC_DOMAIN not configured. Fill .env, then restart ngrok.";
          tail -f /dev/null;
        fi
        exec ngrok http --url="https://$${NGROK_STATIC_DOMAIN}" nginx:80 --log=stdout
    environment:
      NGROK_AUTHTOKEN: ${NGROK_AUTHTOKEN}
      NGROK_STATIC_DOMAIN: ${NGROK_STATIC_DOMAIN}
    depends_on:
      - nginx
    networks:
      - govservice_net
    ports:
      - "127.0.0.1:4040:4040"

networks:
  govservice_net:
    driver: bridge

volumes:
  postgres_data:
    driver: local
